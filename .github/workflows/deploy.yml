name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 30m
          script: |
            cd ~/nonograms
            git pull origin main
            
            # write backend .env
            cat > backend/.env << EOF
            DB_USER=appuser
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_NAME=nonograms
            DATABASE_URL=mysql+aiomysql://appuser:${{ secrets.DB_PASSWORD }}@db:3306/nonograms
            SECRET_KEY=${{ secrets.SECRET_KEY }}
            ALGORITHM=HS256
            EOF
            
            # write frontend .env.local
            cat > frontend/.env.local << EOF
            NEXT_PUBLIC_API_URL=http://${{ secrets.SERVER_IP }}:8000/api
            NEXT_PUBLIC_WS_URL=ws://${{ secrets.SERVER_IP }}:8000
            EOF


            docker compose build --no-cache
            docker compose up -d